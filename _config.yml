title: "Maria"
tagline: "blog & projects"
description: "Notes on code and the things I build."
url: "https://ogambamaria.github.io"
baseurl: ""

author:
  name: "Maria"

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
    values:
      layout: "default"

permalink: /posts/:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap

sass:
  style: compressed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
